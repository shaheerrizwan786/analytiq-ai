stages:
  - build
  - deploy

# ──────────────────────────────────────────────────────────────────────────────
# Build the Next.js static export
# ──────────────────────────────────────────────────────────────────────────────
build-frontend:
  stage: build
  image: node:20-alpine
  tags:
    - fit2107
  variables:
    # Set this CI/CD variable in GitLab → Settings → CI/CD → Variables
    # to point to your deployed backend URL (e.g. https://your-app.railway.app)
    NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run build
    # GitLab Pages must serve from a top-level `public/` directory
    - cp -r out/ ../public
  artifacts:
    paths:
      - public/
    expire_in: 1 hour
  cache:
    key: node-modules-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/
  only:
    - master
    - main

# ──────────────────────────────────────────────────────────────────────────────
# Deploy to GitLab Pages
# ──────────────────────────────────────────────────────────────────────────────
pages:
  stage: deploy
  tags:
    - fit2107
  script:
    - echo "Deploying to GitLab Pages"
  artifacts:
    paths:
      - public/
  dependencies:
    - build-frontend
  only:
    - master
    - main
